<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Song Slots — Connecting...</title>
</head>
<body>
  <p>Connecting to Spotify...</p>
  <script>
    const CLIENT_ID = '3be30b5e47d543a3ad68fc02aea1c875';
    const REDIRECT_URI = 'http://127.0.0.1:8000/callback.html';

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        alert('Spotify authorization failed: ' + error);
        window.location.href = '/';
        return;
      }

      if (!code) {
        window.location.href = '/';
        return;
      }

      const codeVerifier = localStorage.getItem('code_verifier');
      if (!codeVerifier) {
        alert('Missing code verifier. Please try connecting again.');
        window.location.href = '/';
        return;
      }

      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: CLIENT_ID,
          grant_type: 'authorization_code',
          code: code,
          redirect_uri: REDIRECT_URI,
          code_verifier: codeVerifier,
        }),
      });

      const data = await response.json();
      if (data.access_token) {
        sessionStorage.setItem('access_token', data.access_token);
        localStorage.removeItem('code_verifier');
        window.location.href = '/';
      } else {
        alert('Failed to get access token.');
        window.location.href = '/';
      }
    }

    handleCallback();
  </script>
</body>
</html>
